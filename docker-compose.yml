services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env      # copy backend/.env.example -> backend/.env first
    volumes:
      - backend_reports:/app/reports
      - backend_db:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5500:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_reports:
  backend_db:
